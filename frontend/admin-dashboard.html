<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - EcoClean</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="logo">🌿 EcoClean <span style="font-size:1rem; color:var(--secondary);">(Admin)</span></div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="map.html">Map View</a>
            <a href="#" class="btn btn-danger" onclick="logout()">Logout</a>
        </div>
    </nav>

    <div class="dashboard-container">
        <h2>System Overview</h2>
        
        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total Reports</h3>
                <div class="value" id="stat-total">-</div>
            </div>
            <div class="stat-card">
                <h3>Pending</h3>
                <div class="value" id="stat-pending" style="color: #fca5a5;">-</div>
            </div>
            <div class="stat-card">
                <h3>In Progress</h3>
                <div class="value" id="stat-progress" style="color: #fcd34d;">-</div>
            </div>
            <div class="stat-card">
                <h3>Completed</h3>
                <div class="value" id="stat-completed" style="color: #6ee7b7;">-</div>
            </div>
        </div>

        <div style="width: 100%; max-width: 500px; margin: 0 auto 3rem auto; background: var(--dark-card); padding: 2rem; border-radius: 16px; border: 1px solid var(--border);">
            <canvas id="statusChart"></canvas>
        </div>

        <h2 style="color:var(--secondary); border-bottom:1px solid var(--border); padding-bottom:0.5rem; margin-bottom:1rem;">🚚 Fleet & Lorry Dispatches</h2>
        <div class="reports-grid" id="admin-drivers" style="margin-bottom: 4rem;">
            <p>Loading fleet details...</p>
        </div>

        <h2 style="border-bottom:1px solid var(--border); padding-bottom:0.5rem; margin-bottom:1rem;">Community Garbage Reports</h2>
        <div class="reports-grid" id="admin-reports">
            <!-- Rendered via JS -->
            <p>Loading reports...</p>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            checkAuth();
            if(localStorage.getItem('role') !== 'admin') window.location.href = 'user-dashboard.html';
            loadAdminReports();
            loadAdminStats();
        });
    </script>
</body>
</html>
