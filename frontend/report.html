<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Garbage - EcoClean</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">🌿 EcoClean</div>
        <div class="nav-links">
            <a href="user-dashboard.html" class="btn btn-outline" id="nav-back">Back to Dashboard</a>
        </div>
    </nav>

    <div class="form-container" style="max-width: 600px;">
        <h2>Report a Garbage Issue</h2>
        <form id="report-form">
            <div class="form-group">
                <label>Description (Size, type of waste, etc.)</label>
                <textarea id="description" class="form-control" rows="4" placeholder="Describe the garbage accumulation..." required></textarea>
            </div>
            
            <div class="form-group">
                <label>Location Coordinates</label>
                <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                    <input type="text" id="latitude" class="form-control" placeholder="Latitude will appear here" readonly required>
                    <input type="text" id="longitude" class="form-control" placeholder="Longitude will appear here" readonly required>
                </div>
                <button type="button" class="btn btn-outline" onclick="getLocation()" style="width: 100%;">📍 Get Current GPS Location</button>
            </div>

            <div class="form-group" style="margin-top: 1.5rem;">
                <label>Upload Image</label>
                <input type="file" id="image" class="form-control" accept="image/*" required>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Submit Report</button>
        </form>
    </div>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            checkAuth();
            if(localStorage.getItem('role') === 'admin') {
                document.getElementById('nav-back').href = 'admin-dashboard.html';
            }
        });
    </script>
</body>
</html>
