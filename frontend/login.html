<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - EcoClean</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">🌿 EcoClean</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="register.html" class="btn btn-outline">Register</a>
        </div>
    </nav>
    <div class="form-container">
        <h2>Welcome Back</h2>
        <form id="login-form">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" class="form-control" placeholder="user@example.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
        </form>
        <p style="text-align: center; margin-top: 1rem; color: #cbd5e1;">Don't have an account? <a href="register.html" style="color: var(--primary);">Register</a></p>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
